<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codeverse</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f0f14;
color:#fff;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.header{
font-size:28px;
font-weight:600;
margin-bottom:20px;
}

.search{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#1b1b22;
color:#fff;
margin-bottom:20px;
}

.card{
background:#18181f;
padding:15px;
border-radius:15px;
margin-bottom:12px;
cursor:pointer;
transition:0.2s;
display:flex;
justify-content:space-between;
align-items:center;
}

.card:hover{
background:#20202a;
transform:translateY(-2px);
}

.badge{
font-size:12px;
background:#0f172a;
padding:3px 8px;
border-radius:8px;
margin-left:5px;
color:#22c55e;
}

.codeViewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000dd;
display:none;
justify-content:center;
align-items:center;
}

.codeBox{
background:#111;
width:90%;
max-width:900px;
height:80%;
border-radius:12px;
padding:15px;
overflow:auto;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

pre{
color:#00ffae;
white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="container">

<div class="header">📦 My Scrape Code</div>

<input type="text" class="search" placeholder="Search code..." onkeyup="searchCode(this.value)">

<div id="list"></div>

</div>

<div class="codeViewer" id="viewer">
<div class="codeBox">
<div class="close" onclick="closeCode()">✖</div>
<pre id="code"></pre>
</div>
</div>

<script>

const owner = "Auohhjcgjfhfgseer"
const repo = "Zero_koyeb"
const folder = "scrape"

async function loadFiles(){

const res = await fetch(
`https://api.github.com/repos/${owner}/${repo}/contents/${folder}`
)

const data = await res.json()

const files = data
.filter(file => file.name.endsWith(".js"))
.map(file => file.name)

render(files)

}

function render(files){

const list = document.getElementById("list")
list.innerHTML=""

files.forEach(file=>{

const div = document.createElement("div")
div.className="card"

div.innerHTML=`
<div>
📄 ${file}
<span class="badge">Javascript</span>
<span class="badge">Scraper</span>
</div>
➡
`

div.onclick=()=>openCode(file)

list.appendChild(div)

})

}

async function openCode(file){

document.getElementById("viewer").style.display="flex"

const res = await fetch(`./scrape/${file}`)
const text = await res.text()

document.getElementById("code").textContent = text

}

function closeCode(){
document.getElementById("viewer").style.display="none"
}

loadFiles()

</script>

</body>
</html>
