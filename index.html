<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeverse | GitHub Plugins</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f0f14; color: #fff; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { font-size: 28px; font-weight: 600; margin-bottom: 20px; color: #22c55e; }
        .search { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #1b1b22; color: #fff; margin-bottom: 25px; outline: none; }
        .search:focus { border-color: #22c55e; }
        .card { background: #18181f; padding: 18px; border-radius: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .card:hover { background: #20202a; transform: translateY(-3px); border-color: #22c55e44; }
        .badge { font-size: 11px; background: #0f172a; padding: 4px 10px; border-radius: 8px; margin-left: 5px; color: #22c55e; text-transform: uppercase; border: 1px solid #22c55e44; }
        .codeViewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 100; }
        .codeBox { background: #0a0a0a; width: 95%; max-width: 1000px; height: 90%; border-radius: 15px; padding: 25px; position: relative; border: 1px solid #22c55e33; }
        .controls { position: absolute; top: 15px; right: 20px; display: flex; gap: 15px; align-items: center; }
        .btn-copy { background: #22c55e; color: #000; border: none; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .close { cursor: pointer; font-size: 24px; color: #ff5f56; }
        pre { color: #22c55e; white-space: pre-wrap; word-wrap: break-word; overflow-y: auto; height: 90%; margin-top: 30px; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; padding: 15px; background: #000; border-radius: 10px; }
        #loading { text-align: center; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">📦 My Scrape Code</div>
    <input type="text" class="search" id="searchInput" placeholder="Cari di GitHub..." onkeyup="searchCode()">
    <div id="loading">Menghubungkan ke GitHub...</div>
    <div id="list"></div>
</div>

<div class="codeViewer" id="viewer">
    <div class="codeBox">
        <div class="controls">
            <button class="btn-copy" onclick="copyCode()">Copy Code</button>
            <div class="close" onclick="closeCode()">✖</div>
        </div>
        <pre id="codeDisplay"></pre>
    </div>
</div>

<script>
    // --- KONFIGURASI GITHUB ANDA ---
    const GITHUB_USER = "Auohhjcgjfhfgseertresdffgyyuiyt"; // Ganti dengan Username GitHub Anda
    const GITHUB_REPO = "Zero_koyeb"; // Ganti dengan Nama Repository Anda
    const FOLDER_PATH = "scrape";      // Ganti dengan Nama Folder tempat file .js berada

    // URL API GitHub untuk list file
    const API_URL = `https://github.com{GITHUB_USER}/${GITHUB_REPO}/contents/${FOLDER_PATH}`;
    // URL Raw GitHub untuk baca isi file
    const RAW_URL = `https://githubusercontent.com{GITHUB_USER}/${GITHUB_REPO}/main/${FOLDER_PATH}/`;

    async function loadFromGitHub() {
        const listDiv = document.getElementById("list");
        const loading = document.getElementById("loading");

        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error("Repo tidak ditemukan atau Private");
            const files = await response.json();

            loading.style.display = "none";
            listDiv.innerHTML = "";

            files.filter(f => f.name.endsWith('.js')).forEach(file => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div>
                        <span style="font-size:18px">📄</span> <b>${file.name}</b>
                        <span class="badge">JS</span>
                        <span class="badge">GitHub</span>
                    </div>
                    <span style="color:#22c55e">➜</span>
                `;
                card.onclick = () => openCode(file.name);
                listDiv.appendChild(card);
            });

        } catch (err) {
            loading.innerHTML = `<span style="color:#ff5f56">Gagal Memuat: ${err.message}</span>`;
        }
    }

    async function openCode(fileName) {
        const viewer = document.getElementById("viewer");
        const display = document.getElementById("codeDisplay");
        
        viewer.style.display = "flex";
        display.textContent = "// Mengambil kode dari GitHub...";

        try {
            const res = await fetch(RAW_URL + fileName);
            const text = await res.text();
            display.textContent = text;
        } catch (err) {
            display.textContent = "// Error: Gagal mengambil isi file.";
        }
    }

    function closeCode() {
        document.getElementById("viewer").style.display = "none";
    }

    function copyCode() {
        const text = document.getElementById("codeDisplay").textContent;
        navigator.clipboard.writeText(text);
        alert("Kode disalin!");
    }

    function searchCode() {
        const input = document.getElementById("searchInput").value.toLowerCase();
        const cards = document.querySelectorAll(".card");
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(input) ? "flex" : "none";
        });
    }

    // Jalankan otomatis
    loadFromGitHub();
</script>

</body>
</html>
