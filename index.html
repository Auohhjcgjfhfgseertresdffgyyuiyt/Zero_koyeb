<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeverse | Plugin Manager</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f0f14; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header { font-size: 26px; font-weight: 600; margin-bottom: 25px; color: #22c55e; }
        
        .search { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; 
            background: #1b1b22; color: #fff; margin-bottom: 20px; outline: none;
        }
        .search:focus { border-color: #22c55e; }

        .card { 
            background: #18181f; padding: 18px; border-radius: 15px; margin-bottom: 12px; 
            cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center;
        }
        .card:hover { background: #20202a; transform: scale(1.02); }
        .badge { font-size: 11px; background: #22c55e22; padding: 4px 10px; border-radius: 8px; color: #22c55e; margin-left: 8px; }

        /* Modal Viewer */
        .viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; z-index: 100; }
        .v-header { padding: 15px 25px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .v-code { flex: 1; overflow: auto; padding: 20px; color: #22c55e; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        
        .btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-copy { background: #22c55e; color: #000; }
        .btn-close { background: #ff5f56; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">📦 My Plugin List</div>
    <input type="text" class="search" id="src" placeholder="Cari nama file..." onkeyup="search()">
    <div id="list"></div>
</div>

<div class="viewer" id="viewer">
    <div class="v-header">
        <span id="v-title" style="font-weight: 600;">Filename</span>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-copy" onclick="copy()">Salin Kode</button>
            <button class="btn btn-close" onclick="closeView()">Tutup</button>
        </div>
    </div>
    <pre class="v-code" id="v-content"></pre>
</div>

<!-- PANGGIL DATA DARI DATA.JS -->
<script src="data.js"></script>

<script>
    const listDiv = document.getElementById("list");

    // Menampilkan daftar dari data.js
    function render() {
        listDiv.innerHTML = myPlugins.map((p, i) => `
            <div class="card" onclick="openView(${i})">
                <div>
                    📄 <b>${p.name}</b>
                    <span class="badge">${p.category}</span>
                </div>
                <span style="color:#22c55e">Lihat ➔</span>
            </div>
        `).join('');
    }

    function openView(index) {
        const p = myPlugins[index];
        document.getElementById("viewer").style.display = "flex";
        document.getElementById("v-title").innerText = p.name + " (By " + p.author + ")";
        document.getElementById("v-content").innerText = p.code;
    }

    function closeView() { document.getElementById("viewer").style.display = "none"; }

    function copy() {
        navigator.clipboard.writeText(document.getElementById("v-content").innerText);
        alert("Kode berhasil disalin!");
    }

    function search() {
        const q = document.getElementById("src").value.toLowerCase();
        const cards = document.querySelectorAll(".card");
        cards.forEach((c, i) => {
            c.style.display = myPlugins[i].name.toLowerCase().includes(q) ? "flex" : "none";
        });
    }

    render();
</script>

</body>
</html>
