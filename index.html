<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeverse | My Scrapers</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f0f14; color: #fff; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { font-size: 28px; font-weight: 600; margin-bottom: 20px; color: #22c55e; }
        
        .search { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; 
            background: #1b1b22; color: #fff; margin-bottom: 25px; outline: none;
        }
        .search:focus { border-color: #22c55e; }

        #list { display: flex; flex-direction: column; gap: 10px; }
        .card { 
            background: #18181f; padding: 18px; border-radius: 15px; 
            cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid transparent;
        }
        .card:hover { background: #20202a; transform: translateY(-3px); border-color: #22c55e44; }

        .badge { font-size: 11px; background: #0f172a; padding: 4px 10px; border-radius: 8px; margin-left: 5px; color: #22c55e; text-transform: uppercase; border: 1px solid #22c55e44; }

        /* Viewer Modal */
        .codeViewer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .codeBox { 
            background: #0a0a0a; width: 95%; max-width: 1000px; height: 90%; 
            border-radius: 15px; padding: 25px; position: relative; border: 1px solid #22c55e33;
        }
        .controls { position: absolute; top: 15px; right: 20px; display: flex; gap: 15px; align-items: center; }
        .btn-copy { background: #22c55e; color: #000; border: none; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .close { cursor: pointer; font-size: 24px; color: #ff5f56; }

        pre { 
            color: #22c55e; white-space: pre-wrap; word-wrap: break-word; 
            overflow-y: auto; height: 90%; margin-top: 30px; font-family: 'Consolas', monospace;
            font-size: 14px; line-height: 1.6; padding: 15px; background: #000; border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">📦 My Scrape Code</div>
    <input type="text" class="search" id="searchInput" placeholder="Cari plugin (misal: aapldown)..." onkeyup="searchCode()">
    
    <div id="list">
        <!-- List akan muncul otomatis dari script -->
    </div>
</div>

<div class="codeViewer" id="viewer">
    <div class="codeBox">
        <div class="controls">
            <button class="btn-copy" onclick="copyCode()">Copy Code</button>
            <div class="close" onclick="closeCode()">✖</div>
        </div>
        <pre id="codeDisplay"></pre>
    </div>
</div>

<script>
    // --- KONFIGURASI NAMA FILE ---
    // Tambahkan nama file .js Anda di sini setiap kali ada plugin baru
    const myPlugins = [
        "nanobanana.js",
        "tiktok.js",
        "youtube_dl.js",
        "ig_save.js"
    ];

    const folderPath = "../../scrape"; // Pastikan folder ini ada di sebelah file HTML ini

    // Fungsi menampilkan list
    function renderList() {
        const listDiv = document.getElementById("list");
        listDiv.innerHTML = "";

        myPlugins.forEach(file => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div>
                    <span style="font-size:18px">📄</span> <b>${file}</b>
                    <span class="badge">JS</span>
                    <span class="badge">Scraper</span>
                </div>
                <span style="color:#22c55e">➜</span>
            `;
            card.onclick = () => openCode(file);
            listDiv.appendChild(card);
        });
    }

    // Fungsi membuka file
    async function openCode(fileName) {
    const viewer = document.getElementById("viewer");
    const display = document.getElementById("codeDisplay");
    
    viewer.style.display = "flex";
    display.textContent = "// Sedang memuat kode dari: " + folderPath + fileName;

    try {
        // Tambahkan cache: 'no-cache' agar file selalu segar
        const response = await fetch(folderPath + fileName, { cache: 'no-cache' });
        
        if (!response.ok) {
            throw new Error(`Status: ${response.status} - File mungkin tidak ada.`);
        }
        
        const content = await response.text();
        display.textContent = content;
    } catch (err) {
        display.textContent = `// ERROR DETAIL: 
// 1. Pastikan folder '${folderPath}' sejajar dengan file HTML ini.
// 2. Pastikan nama file '${fileName}' sama persis (Case Sensitive).
// 3. JANGAN buka file HTML langsung (klik 2x), gunakan Live Server/Hosting.
// 4. Pesan asli: ${err.message}`;
    }
}


    function closeCode() {
        document.getElementById("viewer").style.display = "none";
    }

    function copyCode() {
        const text = document.getElementById("codeDisplay").textContent;
        navigator.clipboard.writeText(text);
        alert("Kode disalin ke clipboard!");
    }

    function searchCode() {
        const input = document.getElementById("searchInput").value.toLowerCase();
        const cards = document.querySelectorAll(".card");
        cards.forEach(card => {
            const name = card.innerText.toLowerCase();
            card.style.display = name.includes(input) ? "flex" : "none";
        });
    }

    // Jalankan pertama kali
    renderList();
</script>

</body>
</html>
